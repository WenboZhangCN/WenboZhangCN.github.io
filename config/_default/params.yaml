hugoblox:
  schema: "2.0"
  identity:
    name: Wenbo Zhang
    type: person
    tagline: "Wearable Intelligence for Human Movement Understanding"
    description: "Personal academic homepage of Wenbo Zhang, a PhD student working on wearable sensing, ubiquitous computing, and human movement understanding."
  theme:
    mode: system
    pack: default
    colors:
      primary: ""
      secondary: ""
      neutral: ""
  typography:
    font: sans
    size: md
  layout:
    radius: md
    spacing: comfortable
    avatar_shape: circle
  header:
    enable: true
    style: navbar
    sticky: true
    align: center
    search: true
    theme_toggle: true
  footer:
    style: minimal
    language_switcher: true
  copyright:
    notice: © {year} {name}
  content:
    math:
      enable: true
    toc:
      enable: true
    reading_time:
      enable: true
  search:
    enable: true
